<div class="table-card fade-in">
  <div class="card-header">
    <h2>Lista de Personal</h2>
    <span class="badge-count">{{ listaTecnicos.length }} Técnicos</span>
  </div>

  <div class="table-responsive">
    <table class="simple-table">
      <thead>
        <tr>
          <th>Nombre del Técnico</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let tecnico of listaTecnicos">
          <td>
            <div class="user-info-cell">
              <div class="status-indicator" 
                   [ngClass]="{
                     'status-green': tecnico.estado_disponibilidad === 'disponible' || !tecnico.estado_disponibilidad, 
                     'status-orange': tecnico.estado_disponibilidad === 'ocupado', 
                     'status-red': tecnico.estado_disponibilidad === 'ausente'
                   }">
              </div>
              <div class="user-details">
                <strong>{{ tecnico.nombre }}</strong>
                <span class="status-text">{{ tecnico.estado_disponibilidad || 'disponible' | titlecase }}</span>
              </div>
            </div>
          </td>
          <td>{{ tecnico.email }}</td>
          <td><span class="role-badge">{{ tecnico.rol | uppercase }}</span></td>
          <td>
            <button class="btn-icon" (click)="navegarAFormularioTickets(tecnico.id)">
              Enviar Ticket
            </button>
          </td>
        </tr>
        <tr *ngIf="listaTecnicos.length === 0">
          <td colspan="4" class="text-center">No hay personal registrado en el sistema.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
