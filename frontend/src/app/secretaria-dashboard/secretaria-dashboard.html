<div class="secretaria-layout" [class.menu-open]="menuLateralAbierto">

  <div class="sidebar-overlay" *ngIf="menuLateralAbierto" (click)="menuLateralAbierto = false"></div>

  <aside class="sidebar" [class.closed]="!menuLateralAbierto">
    <div class="sidebar-header">
      <div class="brand">
        <h2>Bienvenido</h2>
        <span class="user-name-header">{{ nombreSecretaria }}</span>
        <span class="role-badge">Secretaria</span>
      </div>
    </div> 

    <nav class="sidebar-nav">
      <a routerLink="tickets" routerLinkActive="active" class="nav-item" (click)="menuLateralAbierto = false">
        <span class="material-symbols-outlined icon">send</span>
        Enviar Tickets
      </a>
      <a routerLink="usuarios" routerLinkActive="active" class="nav-item" (click)="menuLateralAbierto = false">
        <span class="material-symbols-outlined icon">group</span>
        Personal Activo
      </a>
      <a routerLink="tickets-list" routerLinkActive="active" class="nav-item" (click)="menuLateralAbierto = false">
        <span class="material-symbols-outlined icon">history</span>
        Historial de Tickets
      </a>

      <div class="spacer"></div>

      <div class="user-info-sidebar profile-link" routerLink="perfil" (click)="menuLateralAbierto = false">
        <div class="avatar-circle">{{ nombreSecretaria ? nombreSecretaria.charAt(0) : 'S' }}</div>
        <div class="user-details">
          <span class="user-name">{{ nombreSecretaria }}</span>
          <span class="user-role">Visualizar Perfil</span> 
        </div>
      </div>

      <button (click)="cerrarSesion()" class="btn-logout">
        <span class="material-symbols-outlined icon" style="margin-right: 8px;">logout</span>
        Cerrar Sesión
      </button>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="top-bar">
      <button class="hamburger-btn" (click)="alternarMenuLateral()">
        <span class="material-symbols-outlined">menu</span>
      </button>
      
      <div class="header-center">
        <img src="icons/seiem_negro.svg" class="logo-header" alt="Logotipo Institucional SEIEM">
      </div>
      
      <div class="header-spacer"></div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
