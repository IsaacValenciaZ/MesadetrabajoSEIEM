<div class="dashboard-layout">

  <aside class="sidebar" [class.closed]="!menuLateralAbierto">
       <div class="sidebar-header">
      <div class="brand">
        <h2>Bienvenido</h2>
        <span class="user-name-header">{{ usuarioActual.nombre }}</span>
        <span class="role-badge">Panel Técnico</span>
      </div>
    </div> 

   <nav class="sidebar-nav">
          <a routerLink="inicio" routerLinkActive="active" class="nav-item">
          <span class="material-symbols-outlined icon">admin_meds</span> Panel de Gestion
      </a>
            <a routerLink="metricas" routerLinkActive="active" class="nav-item">
          <span class="material-symbols-outlined icon">bar_chart</span> Métricas de Usuarios
      </a>
      <a routerLink="gestion-usuarios" routerLinkActive="active" class="nav-item">
          <span class="material-symbols-outlined icon">group</span> Gestión de Usuarios
      </a>
      <a routerLink="historial-tickets" routerLinkActive="active" class="nav-item">
          <span class="material-symbols-outlined icon">schedule</span> Historial Tickets 
      </a>


      <div class="spacer"></div>

      <div class="user-info-sidebar" routerLink="perfil">
        <div class="avatar-circle">{{ usuarioActual?.nombre?.charAt(0) || 'S' }}</div>
        <div class="user-details">
          <span class="user-name">{{ usuarioActual?.nombre || 'Administrador' }}</span>
          <span class="user-role">Supervisor</span> 
        </div>
      </div>

      <button (click)="logout()" class="btn-logout">
          <span class="material-symbols-outlined">logout</span> Cerrar Sesión
      </button>
  </nav>
  </aside>

  <div class="main-wrapper" [class.menu-cerrado]="!menuLateralAbierto">


    <header class="top-bar">
      <button class="hamburger-btn" (click)="alternarMenuLateral()">
        <span class="material-symbols-outlined">menu</span>
      </button>
      
      <div class="header-center">
        <img src="icons/seiem_blanco.svg" class="logo-header" alt="Logotipo Institucional SEIEM">
      </div>
      
      <div class="header-spacer"></div>
    </header>

    <main class="content fade-in">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
