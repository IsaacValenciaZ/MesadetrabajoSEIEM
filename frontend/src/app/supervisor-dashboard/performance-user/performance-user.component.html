<div class="perf-overlay">
  <div class="perf-window">

    <div class="perf-header">
      <div>
        <h2>{{ user?.nombre }}</h2>
        <p class="periodo">{{ obtenerNombreMes(mesSeleccionado) }}</p>
      </div>
      <div class="perf-actions">
        <select class="month-select" [(ngModel)]="mesSeleccionado" (change)="procesarRendimiento()">
          <option *ngFor="let m of mesesDisponibles" [value]="m">{{ obtenerNombreMes(m) }}</option>
        </select>
        <button class="btn-close" (click)="cerrar()">
          <span class="material-symbols-outlined" style="font-size: 1.1rem;">close</span>
        </button>
      </div>
    </div>

    <div class="main-stats" *ngIf="stats">
      <div class="stat-card">
        <span class="stat-label">Total Reportes</span>
        <span class="stat-value">{{ stats.total }}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Tiempo Promedio de Solución</span>
        <span class="stat-value">{{ stats.tiempoPromedio }}</span>
        <p class="stat-sub">Durante {{ obtenerNombreMes(mesSeleccionado) }}</p>
      </div>
    </div>

    <p class="section-label">Métricas del periodo</p>
    <div class="charts-grid" *ngIf="stats">
      <div class="chart-box">
        <h3>Estatus General</h3>
        <canvas id="perfEstatus"></canvas>
      </div>
      <div class="chart-box">
        <h3>Puntualidad</h3>
        <canvas id="perfPuntualidad"></canvas>
      </div>
      <div class="chart-box">
        <h3>Tiempos de Solución</h3>
        <canvas id="perfTiempos"></canvas>
      </div>
    </div>

  </div>
</div>
