<div class="profile-page-container fade-in">
  <div class="profile-card">
    <div class="profile-header-bg">
      <div class="avatar-container">
        <div class="big-avatar">{{ datosUsuario.nombre?.charAt(0) }}</div>
      </div>
    </div>
    <div class="profile-body">
      <div class="header-text">
        <h2>{{ datosUsuario.nombre }}</h2>
        <p class="role-badge">Perfil de Supervisor</p>
      </div>

      <div class="form-content">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre Completo</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined icon">person</span>
              <input type="text" [(ngModel)]="datosUsuario.nombre">
            </div>
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined icon">mail</span>
              <input type="email" [(ngModel)]="datosUsuario.email">
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nueva Contraseña</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined icon">lock</span>
              <input type="password" [(ngModel)]="nuevaContrasena" placeholder="Opcional">
            </div>
          </div>
          <div class="form-group">
            <label>Confirmar</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined icon">lock_reset</span>
              <input type="password" [(ngModel)]="confirmarContrasena" placeholder="Confirma contraseña">
            </div>
          </div>
        </div>
        <button class="btn-update" (click)="procesarActualizacionPerfil()">
          <span class="material-symbols-outlined">save</span> Guardar Cambios
        </button>
      </div>
    </div>
  </div>
</div>
