<div class="modal-overlay" (click)="cerrarModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div>
        <h2>{{ user?.nombre }}</h2>
        <span class="role-badge">Secretaria</span>
      </div>
      <button class="close-btn" (click)="cerrarModal()">✕</button>
    </div>

    <p class="section-divider">Evolución de Eficiencia</p>
    <div class="stats-grid" style="grid-template-columns: 1fr; margin-bottom: 24px;">
      <div class="stats-card">
        <h4>Rendimiento Mensual</h4>
        <p class="subtitle">Histórico de tickets gestionados</p>
        <div class="evolution-chart-wrapper">
          <canvas id="secMonthlyChart"></canvas>
        </div>
      </div>
    </div>

    <p class="section-divider">Gestión Administrativa</p>
    <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">

      <div class="stats-card">
        <h4>Tickets Creados</h4>
        <p class="subtitle">Mes actual — {{ nombreMesActual }}</p>
        <div class="chart-wrapper" *ngIf="indicadorGraficasCargadas">
          <canvas id="secCreatedTotalChart"></canvas>
          <div class="chart-center-text">
            <span class="big-number">{{ cantidadTicketsMesActual }}</span>
            <span class="big-number-label">tickets</span>
          </div>
        </div>
      </div>

      <div class="stats-card">
        <h4>Ritmo de Asignaciones</h4>
        <p class="subtitle">Distribución por periodo</p>
        <div class="chart-wrapper" *ngIf="indicadorGraficasCargadas">
          <canvas id="secCreatedHistoryChart"></canvas>
        </div>
      </div>

    </div>

  </div>
</div>
