<div class="modal-overlay" (click)="cerrarModal()">
  <div class="modal-content profile-page-container" (click)="$event.stopPropagation()">
    
    <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
        <div>
            <h2 style="color: #56212f; margin: 0;">Desempeño: {{ user?.nombre }}</h2>
            <p class="role-badge" style="margin: 5px 0 0 0; color: #777;">Secretaria</p>
        </div>
        <button class="close-btn" (click)="cerrarModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">✖</button>
    </div>

    <h3 class="section-divider">Evolución de Eficiencia</h3>
    <div class="stats-grid">
        <div class="stats-card evolution-card" style="grid-column: span 2; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div class="evolution-chart-wrapper" style="height: 250px;">
                <canvas id="secMonthlyChart"></canvas>
            </div>
        </div>
    </div>

    <h3 class="section-divider" style="margin-top: 30px;">Gestión Administrativa</h3>
    <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="stats-card" style="padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div class="stats-header" style="text-align: center; margin-bottom: 15px;">
                <h4 style="margin:0;">Tickets Creados</h4>
                <p style="font-size: 12px; color: #777;">Mes Actual ({{ nombreMesActual }})</p>
            </div>
            <div class="stats-content">
                <div class="chart-wrapper" *ngIf="indicadorGraficasCargadas" style="height: 180px; position: relative;">
                    <canvas id="secCreatedTotalChart"></canvas> 
                    <div class="chart-center-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                        <span class="big-number" style="color: #3b82f6; font-size: 24px; font-weight: bold; display: block;">{{ cantidadTicketsMesActual }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats-card" style="padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div class="stats-header" style="text-align: center; margin-bottom: 15px;">
                <h4 style="margin:0;">Ritmo de Asignaciones</h4>
            </div>
            <div class="evolution-chart-wrapper" *ngIf="indicadorGraficasCargadas" style="height: 180px;">
                <canvas id="secCreatedHistoryChart"></canvas> 
            </div>
        </div>
    </div>

  </div>
</div>
